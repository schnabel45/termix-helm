# Default values for termix Helm chart

replicaCount: 1

image:
  repository: ghcr.io/lukegus/termix
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: termix.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: termix-tls
    #   hosts:
    #     - termix.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Environment variables
env:
  PORT: "8080"

# Persistence configuration
persistence:
  enabled: true
  storageClassName: "default"
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /app/data
  annotations: {}

# Termix application port
containerPort: 8080
