# Example: Development/Test Values
# Usage: helm install termix ./termix-helm -f values-dev.yaml

replicaCount: 1

image:
  repository: ghcr.io/lukegus/termix
  pullPolicy: Always
  tag: "latest"

service:
  type: NodePort
  port: 80
  targetPort: 8080

ingress:
  enabled: false

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

persistence:
  enabled: true
  storageClassName: "default"
  size: 5Gi
  mountPath: /app/data

autoscaling:
  enabled: false

env:
  PORT: "8080"
