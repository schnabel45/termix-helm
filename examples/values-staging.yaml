# Example: Staging Values
# Usage: helm install termix ./termix-helm -f values-staging.yaml

replicaCount: 1

image:
  repository: ghcr.io/lukegus/termix
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: termix-staging.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: termix-staging-tls
      hosts:
        - termix-staging.example.com

resources:
  limits:
    cpu: 300m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

persistence:
  enabled: true
  storageClassName: "default"
  size: 10Gi
  mountPath: /app/data

autoscaling:
  enabled: false

env:
  PORT: "8080"
